version: '3'

tasks:
  build:
    desc: Build the sqlfmt binary to ./bin/sqlfmt
    cmds:
      - go build -o ./bin/sqlfmt ./cmd/sqlfmt

  run:
    desc: Run sqlfmt (reads SQL from stdin, e.g. echo "SELECT 1" | task run)
    cmds:
      - go run ./cmd/sqlfmt

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  fmt:
    desc: Format all Go source files with gofmt
    cmds:
      - gofmt -w $(find . -name '*.go')

  vet:
    desc: Run go vet static analysis across all packages
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint (install from https://golangci-lint.run)
    preconditions:
      - sh: command -v golangci-lint
        msg: golangci-lint not found — install it from https://golangci-lint.run
    cmds:
      - golangci-lint run
