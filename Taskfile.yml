version: '3'

tasks:
  build:
    desc: Build the sqlfmt binary to ./bin/sqlfmt
    cmds:
      - go build -ldflags "-X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" -o ./bin/sqlfmt ./cmd/sqlfmt

  run:
    desc: Run sqlfmt (reads SQL from stdin, e.g. echo "SELECT 1" | task run)
    cmds:
      - go run ./cmd/sqlfmt

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  coverage:
    desc: Run tests with coverage profiling and write coverage.out
    cmds:
      - go test -coverprofile=coverage.out -covermode=count -coverpkg=./... ./...

  bench:
    desc: Run benchmarks with memory profiling and write bench.txt
    cmds:
      - go test -bench=. -benchmem -count=3 ./... | tee bench.txt

  fmt:
    desc: Format all Go source files with gofmt
    cmds:
      - gofmt -w $(find . -name '*.go')

  vet:
    desc: Run go vet static analysis across all packages
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  release:
    desc: Tag and push the next release — triggers the release workflow (requires svu)
    preconditions:
      - sh: command -v svu
        msg: svu not found — install from https://github.com/caarlos0/svu
    cmds:
      - git tag $(svu next)
      - git push origin $(svu next)
