name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: fmt
        run: task fmt && git diff --exit-code

      - name: vet
        run: task vet

      - name: test
        run: task test

      - name: lint
        uses: golangci/golangci-lint-action@v6
