version: 2

builds:
  - id: sqlfmt
    main: ./cmd/sqlfmt
    binary: sqlfmt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: '^feat:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix:'
      order: 1
    - title: Refactoring
      regexp: '^refactor:'
      order: 2
    - title: Documentation
      regexp: '^docs:'
      order: 3
    - title: CI
      regexp: '^ci:'
      order: 4
  filters:
    exclude:
      - "^chore:"
      - "^test:"
